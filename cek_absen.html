<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Rincian Absensi Pegawai</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { background-color: #f8f9fa; padding: 20px; font-family: sans-serif; }
    .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #map { height: 400px; width: 100%; border-radius: 8px; }
    .table-responsive { max-height: 400px; overflow-y: auto; }
    .loader { display: none; text-align: center; margin: 20px 0; }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row mb-3">
    <div class="col-12 text-center bg-primary text-white p-3 rounded shadow">
      <h2>DASHBOARD ABSENSI PEGAWAI</h2>
      <p class="mb-0" id="dev-info">Mendeteksi Device ID...</p>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-7">
      <div class="card">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Rincian Riwayat Absensi</h5>
          <button class="btn btn-sm btn-success" onclick="loadData()">Refresh Data</button>
        </div>
        <div class="card-body">
          <div class="loader" id="loading">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Memuat data log absensi...</p>
          </div>
          <div class="table-responsive">
            <table class="table table-striped table-hover align-middle small">
              <thead class="table-primary sticky-top">
                <tr>
                  <th>Timestamp</th>
                  <th>Nama</th>
                  <th>ID Device</th>
                  <th>Keterangan</th>
                  <th>Uraian Tugas</th>
                  <th>Output Kegiatan</th>
                  <th>Jam Log</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr>
                  <td colspan="9" class="text-center text-muted">Belum ada data tersedia.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="card">
        <div class="card-header bg-danger text-white">
          <h5 class="mb-0">Peta Sebaran Titik Absen</h5>
        </div>
        <div class="card-body p-2">
          <div id="map"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  let map;
  let markersLayer = L.layerGroup();
  let deviceIdConstant = "";

  // 1. Ambil Parameter Device ID dari URL webapp yang diakses HP 
  // Contoh format di HP: https://script.google.com/.../exec?deviceId=HP-IPHONE-01
  const urlParams = new URLSearchParams(window.location.search);
  deviceIdConstant = urlParams.get('deviceId') || "";

  document.getElementById('dev-info').innerText = deviceIdConstant 
    ? "Terfilter konstan untuk Device ID: " + deviceIdConstant 
    : "Menampilkan semua data (Device ID kosong di URL)";

  // 2. Inisialisasi Peta Awal (Default Center Indonesia)
  function initMap() {
    map = L.map('map').setView([-2.5489, 118.0149], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    markersLayer.addTo(map);
  }

  // 3. Load data dari Spreadsheet via API internal apps script
  function loadData() {
    document.getElementById('loading').style.display = 'block';
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    markersLayer.clearLayers();

    // Panggil fungsi backend 'google.script.run' ke Apps Script
    // atau fetch manual jika di-deploy sebagai Web API publik
    let webAppUrl = "<?= ScriptApp.getService().getUrl() ?>";
    let fetchUrl = webAppUrl + "?request=getAllData&deviceId=" + encodeURIComponent(deviceIdConstant);

    fetch(fetchUrl)
      .then(response => response.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        if (!data || data.length === 0 || data.error) {
          tbody.innerHTML = `<tr><td colspan="9" class="text-center text-danger">${data.error || 'Data absensi tidak ditemukan untuk perangkat ini.'}</td></tr>`;
          return;
        }

        let mapBounds = [];

        data.forEach(item => {
          // Tambah Baris ke Tabel
          let tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.timestamp}</td>
            <td><strong>${item.nama}</strong></td>
            <td><span class="badge bg-secondary">${item.deviceId}</span></td>
            <td><span class="badge ${item.keterangan === 'MASUK' ? 'bg-success' : 'bg-warning'}">${item.keterangan}</span></td>
            <td>${item.uraianTugas || '-'}</td>
            <td>${item.outputKegiatan || '-'}</td>
            <td>${item.waktu}</td>
            <td><span class="text-${item.status.toLowerCase().includes('terlambat') ? 'danger' : 'success'}">${item.status}</span></td>
            <td><button class="btn btn-xs btn-primary py-0 px-1" onclick="focusMarker(${item.lat}, ${item.lng}, '${item.nama}')">Lihat</button></td>
          `;
          tbody.appendChild(tr);

          // Tambah Pin ke Peta jika koordinat valid
          if (item.lat && item.lng) {
            let markerColor = item.keterangan === 'MASUK' ? 'green' : 'orange';
            let marker = L.marker([item.lat, item.lng])
              .bindPopup(`
                <b>${item.nama}</b><br>
                Status: ${item.keterangan}<br>
                Jam: ${item.waktu} (${item.status})<br>
                Tugas: ${item.uraianTugas}
              `);
            markersLayer.addLayer(marker);
            mapBounds.push([item.lat, item.lng]);
          }
        });

        // Autofit zoom peta agar mencakup semua titik koordinat yang ada
        if (mapBounds.length > 0) {
          map.fitBounds(mapBounds);
        }
      })
      .catch(err => {
        document.getElementById('loading').style.display = 'none';
        tbody.innerHTML = `<tr><td colspan="9" class="text-center text-danger">Gagal memuat API data: ${err}</td></tr>`;
      });
  }

  // Fungsi untuk memfokuskan peta ke titik tertentu saat tombol 'Lihat' diklik
  function focusMarker(lat, lng, nama) {
    if (lat && lng) {
      map.setView([lat, lng], 17);
      L.popup()
        .setLatLng([lat, lng])
        .setContent(`<b>Lokasi: ${nama}</b>`)
        .openOn(map);
    } else {
      alert("Koordinat absen tidak valid!");
    }
  }

  // Jalankan ketika halaman dimuat
  window.onload = function() {
    initMap();
    loadData();
  };
</script>

</body>
</html>
