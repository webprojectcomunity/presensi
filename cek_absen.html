<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Rincian Absensi Pegawai</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    body { 
      background-color: #f4f6f9; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding-bottom: 20px;
    }
    
    .app-header {
      background: linear-gradient(135deg, #0d6efd, #0b5ed7);
      color: white;
      padding: 15px 15px 10px 15px;
      border-bottom-left-radius: 15px;
      border-bottom-right-radius: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 15px;
      position: sticky;
      top: 0;
      z-index: 1020;
    }

    #map { 
      height: 35vh; 
      width: 100%; 
      border-radius: 12px;
      z-index: 1;
    }
    
    .map-container {
      background: white;
      padding: 8px;
      border-radius: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin: 0 10px 15px 10px;
    }

    .list-container {
      padding: 0 10px;
    }
    .absen-card {
      background: white;
      border: none;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      margin-bottom: 12px;
      transition: transform 0.2s;
    }
    .absen-card:active {
      transform: scale(0.98);
    }
    .card-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .detail-text {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 4px;
    }
    
    .loader { display: none; text-align: center; margin: 30px 0; }
    
    .btn-lokasi {
      border-radius: 20px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<div class="app-header">
  <div class="d-flex justify-content-between align-items-center">
    <h5 class="mb-0 fw-bold"><i class="bi bi-fingerprint me-2"></i>Absensi</h5>
    <button class="btn btn-sm btn-light rounded-circle" onclick="fetchData()" aria-label="Refresh">
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>
  <p class="mb-0 mt-2 small text-light opacity-75" id="dev-info"><i class="bi bi-phone"></i> Mendeteksi Device...</p>
</div>

<div class="map-container">
  <div class="d-flex justify-content-between align-items-center mb-2 px-1">
    <span class="fw-bold text-secondary" style="font-size: 0.9rem;">
      <i class="bi bi-geo-alt-fill text-danger"></i> Lokasi Log
    </span>
  </div>
  <div id="map"></div>
</div>

<div class="list-container">
  <div class="d-flex justify-content-between align-items-center mb-3 ms-1">
    <h6 class="fw-bold text-secondary mb-0"><i class="bi bi-card-list"></i> Riwayat Absen</h6>
    <select id="filterWaktu" class="form-select form-select-sm w-auto shadow-sm border-primary" onchange="renderData()">
      <option value="harian" selected>Hari Ini</option>
      <option value="mingguan">7 Hari Terakhir</option>
      <option value="bulanan">Bulan Ini</option>
      <option value="semua">Semua Data</option>
    </select>
  </div>
  
  <div class="loader" id="loading">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 small text-muted">Sinkronisasi data...</p>
  </div>
  
  <div id="data-container">
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  let map;
  let markersLayer = L.layerGroup();
  let deviceIdConstant = "";
  let masterData = []; // Menyimpan semua data mentah dari server

  const urlParams = new URLSearchParams(window.location.search);
  deviceIdConstant = urlParams.get('deviceId') || "";

  document.getElementById('dev-info').innerHTML = deviceIdConstant 
    ? `<i class="bi bi-phone"></i> ID: ${deviceIdConstant}`
    : `<i class="bi bi-globe"></i> Semua Perangkat (Admin View)`;

  // Inisialisasi Peta
  function initMap() {
    map = L.map('map', { zoomControl: false }).setView([-2.5489, 118.0149], 5);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    markersLayer.addTo(map);
  }

  // Fungsi Parser Tanggal (Menyesuaikan format Google Sheets Indonesia)
  function parseSheetDate(dateStr) {
    if (!dateStr) return new Date();
    
    // Coba parsing standar Javascript dulu
    let parsed = Date.parse(dateStr);
    if (!isNaN(parsed)) return new Date(parsed);

    // Jika gagal (biasanya karena format DD/MM/YYYY), pecah manual
    try {
      let parts = dateStr.split(' ');
      let d = parts[0].split(/[\/\-]/);
      if (d.length === 3) {
        if (d[0].length === 4) return new Date(d[0], d[1]-1, d[2]); // YYYY/MM/DD
        return new Date(d[2], d[1]-1, d[0]); // DD/MM/YYYY
      }
    } catch(e) { console.error("Format tanggal tidak dikenali:", dateStr); }
    
    return new Date();
  }

  // Tarik Data dari Server (Hanya dilakukan 1x di awal atau saat Refresh)
  function fetchData() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('data-container').innerHTML = '';
    markersLayer.clearLayers();

    // PASTIKAN URL INI ADALAH URL WEB APP ANDA YANG AKTIF
    let webAppUrl = "https://script.google.com/macros/s/AKfycbzFi2rasPQracQJ9WMU3805SjnmfyNxtMYIli0rzLuWI-Yfx2m3Q_aXLGLgTJ7fh41U/exec";
    let fetchUrl = webAppUrl + "?request=getAllData&deviceId=" + encodeURIComponent(deviceIdConstant);

    fetch(fetchUrl)
      .then(response => response.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        
        if (!data || data.length === 0 || data.error) {
          document.getElementById('data-container').innerHTML = `
            <div class="alert alert-warning text-center small rounded-4">
              <i class="bi bi-info-circle fs-4 d-block mb-2"></i>
              ${data.error || 'Belum ada log absensi di sistem.'}
            </div>`;
          masterData = [];
          return;
        }

        // Balik array agar data terbaru selalu di atas, lalu simpan ke memori
        masterData = data.reverse();
        
        // Render data sesuai filter yang aktif (Default: Harian)
        renderData(); 
      })
      .catch(err => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('data-container').innerHTML = `
          <div class="alert alert-danger text-center small rounded-4">
            <i class="bi bi-exclamation-triangle fs-4 d-block mb-2"></i>
            Koneksi server gagal: ${err}
          </div>`;
      });
  }

  // Fungsi Render & Filter (Dipanggil saat Dropdown berubah)
  function renderData() {
    const container = document.getElementById('data-container');
    const filterType = document.getElementById('filterWaktu').value;
    container.innerHTML = '';
    markersLayer.clearLayers();

    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

    // Filter array berdasarkan pilihan dropdown
    let filteredData = masterData.filter(item => {
      let itemDate = parseSheetDate(item.timestamp);
      let itemDayStart = new Date(itemDate.getFullYear(), itemDate.getMonth(), itemDate.getDate()).getTime();

      if (filterType === 'harian') {
        return itemDayStart === todayStart;
      } else if (filterType === 'mingguan') {
        let diffDays = (todayStart - itemDayStart) / (1000 * 60 * 60 * 24);
        return diffDays >= 0 && diffDays <= 7;
      } else if (filterType === 'bulanan') {
        return itemDate.getMonth() === now.getMonth() && itemDate.getFullYear() === now.getFullYear();
      }
      return true; // opsi 'semua'
    });

    // Handle jika setelah difilter data kosong
    if (filteredData.length === 0) {
      container.innerHTML = `
        <div class="alert alert-secondary text-center small rounded-4 mt-3">
          <i class="bi bi-inbox fs-4 d-block mb-2"></i>
          Tidak ada data absensi untuk kategori waktu ini.
        </div>`;
      return;
    }

    let mapBounds = [];

    filteredData.forEach(item => {
      let isMasuk = item.keterangan.toUpperCase() === 'MASUK';
      let badgeColor = isMasuk ? 'bg-success' : 'bg-warning text-dark';
      let iconStatus = isMasuk ? 'bi-box-arrow-in-right' : 'bi-box-arrow-right';
      
      let statusTextClass = item.status.toLowerCase().includes('terlambat') ? 'text-danger fw-bold' : 'text-success fw-bold';

      // Buat UI Card
      let card = document.createElement('div');
      card.className = 'card absen-card p-3';
      card.innerHTML = `
        <div class="card-title-row">
          <div>
            <h6 class="mb-0 fw-bold">${item.nama}</h6>
            <div class="small text-muted" style="font-size: 0.75rem;">${item.timestamp}</div>
          </div>
          <span class="badge ${badgeColor}"><i class="bi ${iconStatus}"></i> ${item.keterangan}</span>
        </div>
        
        <hr class="my-2 text-muted opacity-25">
        
        <div class="detail-text">
          <i class="bi bi-clock"></i> Jam Log: <strong>${item.waktu}</strong> 
          (<span class="${statusTextClass}">${item.status}</span>)
        </div>
        <div class="detail-text">
          <i class="bi bi-journal-text"></i> Tugas: ${item.uraianTugas || '-'}
        </div>
        <div class="detail-text">
          <i class="bi bi-check-circle"></i> Output: ${item.outputKegiatan || '-'}
        </div>

        <button class="btn btn-outline-primary btn-sm btn-lokasi w-100 mt-3" 
          onclick="focusMarker(${item.lat}, ${item.lng}, '${item.nama}', '${item.keterangan}')">
          <i class="bi bi-crosshair"></i> Cek Lokasi Peta
        </button>
      `;
      container.appendChild(card);

      // Tambah Pin ke Peta
      if (item.lat && item.lng) {
        let marker = L.marker([item.lat, item.lng])
          .bindPopup(`
            <div class="text-center">
              <strong>${item.nama}</strong><br>
              <span class="badge ${badgeColor} my-1">${item.keterangan}</span><br>
              <small>${item.waktu}</small>
            </div>
          `);
        markersLayer.addLayer(marker);
        mapBounds.push([item.lat, item.lng]);
      }
    });

    // Auto-fokus Peta
    if (mapBounds.length > 0) {
      map.fitBounds(mapBounds, { padding: [20, 20] });
    }
  }

  function focusMarker(lat, lng, nama, ket) {
    if (lat && lng) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      map.flyTo([lat, lng], 17, { duration: 1.5 });
      L.popup()
        .setLatLng([lat, lng])
        .setContent(`<div class="text-center"><b>${nama}</b><br><small>${ket}</small></div>`)
        .openOn(map);
    } else {
      alert("Koordinat absen tidak valid atau belum tersimpan!");
    }
  }

  // Mulai eksekusi
  window.onload = function() {
    initMap();
    fetchData(); // Ambil data saat halaman pertama dimuat
  };
</script>

</body>
</html>
