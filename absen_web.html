<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div id="pageAbsen" class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-2">Absensi</h2>
        <p class="text-center text-slate-500 text-sm mb-6" id="statusLokasi">Mencari lokasi GPS...</p>
        
        <div class="space-y-4">
            <textarea id="uraian" class="w-full p-2 border rounded-lg" placeholder="Uraian Tugas"></textarea>
            <input type="text" id="output" class="w-full p-2 border rounded-lg" placeholder="Output Kegiatan">
            
            <div class="flex gap-2 pt-4">
                <button id="btnMasuk" disabled onclick="kirimAbsen('MASUK')" class="flex-1 bg-emerald-500 disabled:bg-slate-300 text-white font-bold py-3 rounded-xl transition">MASUK</button>
                <button id="btnPulang" disabled onclick="kirimAbsen('PULANG')" class="flex-1 bg-blue-500 disabled:bg-slate-300 text-white font-bold py-3 rounded-xl transition">PULANG</button>
            </div>
            
            <button id="btnDaftarNav" onclick="tampilkanDaftar()" class="w-full text-slate-400 text-sm hover:text-indigo-600 mt-4 transition">
                Belum terdaftar? Klik di sini untuk Daftar
            </button>
        </div>
    </div>

    <div id="pageDaftar" class="hidden bg-white p-6 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">Registrasi Karyawan</h2>
        <div class="space-y-4">
            <input type="text" id="regId" class="w-full p-2 border rounded-lg" placeholder="ID Karyawan">
            <input type="text" id="regNama" class="w-full p-2 border rounded-lg" placeholder="Nama Lengkap">
            <button onclick="prosesDaftar()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">DAFTAR SEKARANG</button>
            <button onclick="batalDaftar()" class="w-full text-slate-400 text-sm mt-2">Kembali ke Absensi</button>
        </div>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzFi2rasPQracQJ9WMU3805SjnmfyNxtMYIli0rzLuWI-Yfx2m3Q_aXLGLgTJ7fh41U/exec";
        let lat = 0, lng = 0;
        let deviceIdWeb = localStorage.getItem("webDeviceId") || 'WEB-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("webDeviceId", deviceIdWeb);

        // --- NAVIGASI HALAMAN ---
        function tampilkanDaftar() {
            document.getElementById('pageAbsen').classList.add('hidden');
            document.getElementById('pageDaftar').classList.remove('hidden');
        }

        function batalDaftar() {
            document.getElementById('pageDaftar').classList.add('hidden');
            document.getElementById('pageAbsen').classList.remove('hidden');
        }

        // --- LOGIKA UTAMA ---
        window.onload = () => {
    const id = localStorage.getItem("savedIdKaryawan");
    console.log("ID Karyawan ditemukan:", id); // Cek ini di console
    if (id) {
        document.getElementById('pageDaftar').classList.add('hidden');
        document.getElementById('pageAbsen').classList.remove('hidden');
        inisialisasiGPS();
    }
};
       function inisialisasiGPS() {
    // Tampilkan status awal
    document.getElementById('statusLokasi').innerText = "📍 Mencari lokasi GPS...";
    
    if (!navigator.geolocation) {
        document.getElementById('statusLokasi').innerText = "❌ Browser tidak mendukung GPS.";
        return;
    }

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            lat = pos.coords.latitude;
            lng = pos.coords.longitude;
            document.getElementById('statusLokasi').innerText = `✅ Lokasi Siap: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            
            // Aktifkan tombol
            document.getElementById('btnMasuk').disabled = false;
            document.getElementById('btnPulang').disabled = false;
        },
        (err) => {
            console.error(err);
            document.getElementById('statusLokasi').innerText = "⚠️ Gagal dapat lokasi. Pastikan GPS aktif!";
        },
        { 
            enableHighAccuracy: true, // Menggunakan GPS tingkat tinggi
            timeout: 20000,           // Memberi waktu tunggu 20 detik
            maximumAge: 0 
        }
    );
}

        async function prosesDaftar() {
    const idInput = document.getElementById('regId').value.trim();
    const namaInput = document.getElementById('regNama').value.trim();
    
    if (!idInput || !namaInput) { 
        alert("ID dan Nama wajib diisi!"); 
        return; 
    }

    const payload = { action: "register", id: idInput, nama: namaInput, deviceId: deviceIdWeb };
    
    try {
        const res = await fetch(scriptUrl, { 
            method: 'POST', 
            mode: 'cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload) 
        });
        
        const msg = await res.text();
        
        // Debugging: Log pesan ke konsol browser (F12)
        console.log("Respons Server:", msg);

        if (msg.toLowerCase().includes("berhasil")) {
            alert("Registrasi Berhasil!");
            localStorage.setItem("savedIdKaryawan", idInput);
            
            // Pindah halaman dengan pasti
            batalDaftar();
            inisialisasiGPS();
        } else {
            alert("Pesan Server: " + msg);
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Gagal terhubung ke server. Pastikan koneksi internet stabil.");
    }
}
        async function kirimAbsen(tipe) {
            const payload = {
                action: "verify",
                tipeAbsen: tipe,
                id: localStorage.getItem("savedIdKaryawan"),
                deviceId: deviceIdWeb,
                latitude: lat,
                longitude: lng,
                uraianTugas: document.getElementById('uraian').value,
                outputKegiatan: document.getElementById('output').value
            };
            const res = await fetch(scriptUrl, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert(await res.text());
        }
    </script>
</body>
</html>
